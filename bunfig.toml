# Bun Configuration for DoNotDev Consumer App
# Documentation: https://bun.sh/docs/runtime/bunfig

[install]
# Enable workspace support for local apps/packages
workspace = true

# Dependency installation settings
exact = false
optional = true
peer = true

# Workspace linking strategy
linker = "hoisted"

[run]
bun = true
shell = "bun"

[install.lockfile]
version = 2
